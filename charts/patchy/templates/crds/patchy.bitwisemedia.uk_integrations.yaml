{{- if .Values.crds.install }}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    {{- if .Values.crds.keep }}
    helm.sh/resource-policy: keep
    {{- end }}
    controller-gen.kubebuilder.io/version: v0.21.0
  name: integrations.patchy.bitwisemedia.uk
spec:
  group: patchy.bitwisemedia.uk
  names:
    categories:
    - patchy
    kind: Integration
    listKind: IntegrationList
    plural: integrations
    singular: integration
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.provider
      name: Provider
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .status.webhookPath
      name: Webhook
      priority: 1
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Integration configures one external system patchy exchanges finding state
          with: scanners in (code-scanning alerts, wiz), tracking out (GitHub
          issues), and the human signals flowing back.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              IntegrationSpec configures one external system. Exactly the provider block
              matching spec.provider must be set (CEL-enforced) — integrations are
              strongly typed, not generic.
            properties:
              github:
                description: GitHub is the github provider block.
                properties:
                  baseURL:
                    description: |-
                      BaseURL points at a GitHub Enterprise Server host; empty means
                      github.com.
                    type: string
                  codeScanningAlerts:
                    description: CodeScanningAlerts enables scanner ingestion.
                    properties:
                      enabled:
                        description: Enabled turns the code-scanning capability on.
                        type: boolean
                    required:
                    - enabled
                    type: object
                  issues:
                    description: Issues enables the tracking projection.
                    properties:
                      approveComment:
                        default: /approve
                        description: ApproveComment is the comment command that approves
                          a held remediation.
                        type: string
                      enabled:
                        description: Enabled turns the issues capability on.
                        type: boolean
                    required:
                    - enabled
                    type: object
                  redelivery:
                    description: Redelivery enables the failed-delivery sweep.
                    properties:
                      enabled:
                        description: |-
                          Enabled turns the sweep on. Requires App credentials — the delivery
                          log is App-scoped, so a PAT integration cannot sweep.
                        type: boolean
                      lookback:
                        default: 24h
                        description: |-
                          Lookback bounds how far back each sweep scans the delivery log.
                          GitHub retains deliveries for 30 days.
                        type: string
                    required:
                    - enabled
                    type: object
                type: object
              interval:
                default: 10m
                description: Interval between credential revalidations.
                type: string
              provider:
                description: Provider is the external system type.
                enum:
                - github
                type: string
              replay:
                description: |-
                  Replay requests one full redelivery of every webhook delivery in the
                  lookback window, including deliveries that already succeeded (the
                  receiver dedups; ingestion is idempotent). Freshness against
                  status.redelivery.replayedAt decides whether the request is still
                  actionable — the controller never clears spec.
                properties:
                  at:
                    description: At is when the request was received.
                    format: date-time
                    type: string
                  by:
                    description: By is the requesting login.
                    type: string
                required:
                - at
                - by
                type: object
              reset:
                description: |-
                  Reset requests the receiver forget its delivery dedup window, so a
                  redelivery of an already-handled delivery GUID is ingested again.
                  Stamped by the status page's demo reset alongside deleting the
                  pipeline resources; without it, redeliveries of recently seen GUIDs
                  answer 202 and are silently dropped until the dedup TTL elapses.
                  Freshness against status.resetAt decides whether the request is still
                  actionable — the controller never clears spec.
                properties:
                  at:
                    description: At is when the request was received.
                    format: date-time
                    type: string
                  by:
                    description: By is the requesting login.
                    type: string
                required:
                - at
                - by
                type: object
              secretRef:
                description: |-
                  SecretRef names the credential Secret. For github: either key "token"
                  (PAT, dev) or keys "appID" + "privateKey" (GitHub App), plus
                  "webhookSecret" for receiver HMAC validation.
                properties:
                  name:
                    description: Name of the Secret.
                    minLength: 1
                    type: string
                required:
                - name
                type: object
              suspend:
                description: Suspend pauses reconciliation of this integration.
                type: boolean
            required:
            - provider
            - secretRef
            type: object
            x-kubernetes-validations:
            - message: exactly the provider block matching spec.provider must be set
              rule: (self.provider == 'github') == has(self.github)
          status:
            description: IntegrationStatus is the integration's observed state.
            properties:
              conditions:
                description: |-
                  Conditions of the integration (Ready: credential valid, system
                  reachable).
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              installations:
                description: Installations summarizes the App installations.
                items:
                  description: |-
                    InstallationSummary counts one GitHub App installation — counts and
                    accounts only, never a repository list (the estate is ~15K repositories).
                  properties:
                    account:
                      description: Account the App is installed on.
                      type: string
                    id:
                      description: ID of the installation.
                      format: int64
                      type: integer
                    repositories:
                      description: Repositories the installation covers.
                      format: int32
                      type: integer
                  required:
                  - account
                  - id
                  type: object
                type: array
              lastEventAt:
                description: LastEventAt is when the receiver last accepted a delivery.
                format: date-time
                type: string
              observedGeneration:
                description: ObservedGeneration is the last spec generation acted
                  on.
                format: int64
                type: integer
              rateLimit:
                description: RateLimit is the last observed API quota.
                properties:
                  remaining:
                    description: Remaining requests in the current window.
                    format: int32
                    type: integer
                  resetAt:
                    description: ResetAt is when the window resets.
                    format: date-time
                    type: string
                required:
                - remaining
                type: object
              redelivery:
                description: Redelivery reports the last failed-delivery sweep.
                properties:
                  error:
                    description: Error carries the last sweep failure; empty when
                      the sweep succeeded.
                    type: string
                  lastSweepAt:
                    description: LastSweepAt is when the last sweep ran.
                    format: date-time
                    type: string
                  redelivered:
                    description: Redelivered counts the redeliveries the last sweep
                      requested.
                    format: int32
                    type: integer
                  replayedAt:
                    description: |-
                      ReplayedAt echoes spec.replay.at once that replay has run; a
                      spec.replay newer than this triggers another full replay.
                    format: date-time
                    type: string
                  scanned:
                    description: Scanned counts the delivery attempts the last sweep
                      inspected.
                    format: int32
                    type: integer
                  truncated:
                    description: |-
                      Truncated marks a sweep that hit the page cap before reaching the
                      lookback horizon; the oldest part of the window went unscanned.
                    type: boolean
                type: object
              resetAt:
                description: |-
                  ResetAt echoes spec.reset.at once the receiver's dedup window has
                  been dropped; a spec.reset newer than this triggers another drop.
                format: date-time
                type: string
              webhookPath:
                description: |-
                  WebhookPath is the receiver path deliveries must target
                  (e.g. /github/webhooks).
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
{{- end }}
