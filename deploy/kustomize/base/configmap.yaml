#
# The one settings surface for all five controllers, consumed with envFrom.
#
# Every key is a PATCHY_* environment variable, which internal/cli/options.go
# maps back onto a cobra flag: prefix PATCHY, dashes become underscores
# (--claude-agent-image -> PATCHY_CLAUDE_AGENT_IMAGE). Precedence is flag > env > default,
# and the Deployments pass no flags other than the `serve` subcommand, so what
# is here is what runs.
#
# A key a given binary does not bind is simply ignored by that binary, which
# is why one ConfigMap can serve all five (PATCHY_ACCUMULATION_WINDOW is inert
# in the remediation-controller, and so on).
#
# NOT here: GitHub credentials and webhook secrets. Provider and forge
# credentials live in Secrets referenced by the Integration and Forge custom
# resources (spec.secretRef) — see crs.example.yaml and secrets.example.yaml.
---
apiVersion: v1
kind: ConfigMap
metadata:
    name: patchy-config
    namespace: patchy
    labels:
        app.kubernetes.io/name: patchy
        app.kubernetes.io/part-of: patchy
data:
    # ---- shared (internal/cli.Options, every binary) ------------------------
    PATCHY_LISTEN_ADDR: ":8080"
    PATCHY_HEALTH_ADDR: ":8081"

    # ---- integration-controller ---------------------------------------------
    # DESIGN.md requirement 2: alerts of one advisory type accumulate into a
    # single finding for an hour.
    PATCHY_ACCUMULATION_WINDOW: 1h

    # ---- source-controller --------------------------------------------------
    # The artifact server: SHA-pinned repository tarballs the agent pods fetch
    # (credential-less; the URL carries a random 128-bit id and the Job pins
    # the sha256 digest). PATCHY_ARTIFACT_BASE_URL defaults to the in-cluster
    # Service address, so it only needs setting when the Service name differs.
    PATCHY_ARTIFACT_ADDR: ":9790"
    PATCHY_ARTIFACT_DIR: /data/artifacts

    # ---- context-controller -------------------------------------------------
    # PATCHY_STATIC_CONTEXT_FILE: unset in base -> the Noop enhancer (the CMDB
    # placeholder). The dev overlay points it at a mounted YAML file.

    # ---- investigation-controller -------------------------------------------
    # DESIGN.md requirement 5: only findings older than an hour are picked up.
    PATCHY_FINDING_MIN_AGE: 1h
    PATCHY_MAX_ATTEMPTS: "2"
    PATCHY_MAX_CONCURRENT_INVESTIGATIONS: "3"
    # DESIGN.md requirement 6: below this, remediation waits for approval.
    PATCHY_CONFIDENCE_THRESHOLD: "0.75"

    # ---- remediation-controller ---------------------------------------------
    PATCHY_MAX_CONCURRENT_REMEDIATIONS: "1"
    # Completed findings are kept this long, then deleted; the FindingRollup
    # objects retain the all-time statistics. "0" keeps findings forever.
    PATCHY_FINDING_TTL: 336h
    # Long-waiting remediations gain +1 effective priority per interval, up to
    # the cap — starvation protection for low-priority findings.
    PATCHY_PRIORITY_AGING_INTERVAL: 24h
    PATCHY_PRIORITY_AGING_CAP: "25"

    # ---- the agent Jobs (both job controllers) ------------------------------
    PATCHY_AGENT_NAMESPACE: patchy-agents
    PATCHY_AGENT_SERVICE_ACCOUNT: patchy-agent
    # The per-harness runner fleet. A harness is enabled only when it is in
    # PATCHY_HARNESSES AND its credential Secret exists; the model chosen for a
    # stage decides which runner (image + credential + egress policy) the Job
    # uses. Each runner image is ALSO pinned by the `images:` block in
    # kustomization.yaml for provenance, so overlays must keep the two in step
    # (the `images:` block does not rewrite these ConfigMap values).
    PATCHY_HARNESSES: claude
    PATCHY_CLAUDE_AGENT_IMAGE: ghcr.io/bitwise-media-group/patchy/claude-agent-runner:latest
    PATCHY_CLAUDE_SECRET: patchy-anthropic
    PATCHY_CLAUDE_SECRET_KEY: api-key
    # Env var the credential is injected as: ANTHROPIC_API_KEY for an API
    # key, or CLAUDE_CODE_OAUTH_TOKEN for a `claude setup-token` OAuth token.
    PATCHY_CLAUDE_SECRET_ENV: ANTHROPIC_API_KEY
    # Enable the codex runner by adding `codex` to PATCHY_HARNESSES and
    # supplying the OpenAI credential Secret (patchy-openai):
    PATCHY_CODEX_AGENT_IMAGE: ghcr.io/bitwise-media-group/patchy/codex-agent-runner:latest
    PATCHY_CODEX_SECRET: patchy-openai
    PATCHY_CODEX_SECRET_KEY: api-key
    PATCHY_CODEX_SECRET_ENV: OPENAI_API_KEY
    PATCHY_JOB_DEADLINE: 1h
    PATCHY_JOB_TTL: 1h

    # ---- the agent stages ---------------------------------------------------
    # The job controllers pass these through to every agent pod, where
    # agentrun.FromEnv reads them. Models are canonical, provider-qualified ids
    # (e.g. anthropic/claude-sonnet-5); the harness that runs a model is
    # derived from it, so an OpenAI model routes to the codex runner and an
    # Anthropic model to the claude runner.
    #
    # The INVESTIGATE_* limits are absolute — that stage runs on exactly
    # these. The REMEDIATE_MAX_TURNS / REMEDIATE_TOKEN_BUDGET limits are
    # CEILINGS: the investigation report requests its own model, max_turns and
    # token_budget for the remediation stage, and both the controller and the
    # runner clamp those requests to these bounds (and to the allowlist), so a
    # compromised or over-eager investigation cannot spend more than an
    # operator permits. Every allowlisted model must have an enabled harness
    # that supports it, or the controllers refuse to start.
    #
    # The token budgets are enforced by the runner watching the harness's
    # streamed usage events and killing the process group when the cumulative
    # output-token count is exceeded — the CLI has no such flag itself.
    PATCHY_MODEL_ALLOWLIST: anthropic/claude-sonnet-5,anthropic/claude-opus-4-8

    PATCHY_INVESTIGATE_MODEL: anthropic/claude-sonnet-5
    PATCHY_INVESTIGATE_TIMEOUT: 15m
    PATCHY_INVESTIGATE_MAX_TURNS: "25"
    PATCHY_INVESTIGATE_TOKEN_BUDGET: "150000"

    PATCHY_REMEDIATE_MODEL: anthropic/claude-sonnet-5
    PATCHY_REMEDIATE_TIMEOUT: 45m
    PATCHY_REMEDIATE_MAX_TURNS: "80"
    PATCHY_REMEDIATE_TOKEN_BUDGET: "400000"
