---
apiVersion: apps/v1
kind: Deployment
metadata:
    name: patchy-integration-controller
    namespace: patchy
    labels:
        app: integration-controller
        app.kubernetes.io/name: integration-controller
        app.kubernetes.io/part-of: patchy
        app.kubernetes.io/component: controller
spec:
    # One replica + Recreate. The binaries do run leader election (a
    # coordination.k8s.io Lease), but that is insurance against a botched
    # rollout racing two replicas — singleton-by-construction stays the
    # deployment model.
    replicas: 1
    strategy:
        type: Recreate
    selector:
        matchLabels:
            app.kubernetes.io/name: integration-controller
            app.kubernetes.io/part-of: patchy
    template:
        metadata:
            labels:
                app: integration-controller
                app.kubernetes.io/name: integration-controller
                app.kubernetes.io/part-of: patchy
                app.kubernetes.io/component: controller
        spec:
            serviceAccountName: patchy-integration-controller
            securityContext:
                runAsNonRoot: true
                runAsUser: 65532
                runAsGroup: 65532
                fsGroup: 65532
                seccompProfile:
                    type: RuntimeDefault
            containers:
                - name: controller
                  # Built from Dockerfile.controller (repo root)
                  # (TARGET=integration-controller in .goreleaser.yaml).
                  image: ghcr.io/bitwise-media-group/patchy/integration-controller:latest
                  args: ["serve"]
                  envFrom:
                      - configMapRef:
                            name: patchy-config
                  env:
                      - name: POD_NAMESPACE
                        valueFrom:
                            fieldRef:
                                fieldPath: metadata.namespace
                  ports:
                      - name: http
                        containerPort: 8080
                        protocol: TCP
                      - name: health
                        containerPort: 8081
                        protocol: TCP
                  livenessProbe:
                      httpGet:
                          path: /healthz
                          port: health
                      initialDelaySeconds: 5
                      periodSeconds: 20
                  readinessProbe:
                      httpGet:
                          path: /readyz
                          port: health
                      initialDelaySeconds: 2
                      periodSeconds: 10
                  resources:
                      requests:
                          cpu: 50m
                          memory: 96Mi
                      limits:
                          cpu: 500m
                          memory: 256Mi
                  securityContext:
                      allowPrivilegeEscalation: false
                      readOnlyRootFilesystem: true
                      capabilities:
                          drop: ["ALL"]
                      seccompProfile:
                          type: RuntimeDefault
                  volumeMounts:
                      - name: tmp
                        mountPath: /tmp
            volumes:
                # The root filesystem is read-only; Go's os.CreateTemp and the
                # HTTP stack want a writable /tmp.
                - name: tmp
                  emptyDir: {}
