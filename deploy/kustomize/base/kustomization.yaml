apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Namespaces are created here, so nothing sets a global `namespace:` — each
# resource names its own (patchy or patchy-agents).
resources:
    # CRDs first: everything else may reference the kinds they define. The
    # files are controller-gen output (mise run codegen) — never hand-edited.
    - crds/patchy.bitwisemedia.uk_findings.yaml
    - crds/patchy.bitwisemedia.uk_findingrollups.yaml
    - crds/patchy.bitwisemedia.uk_forges.yaml
    - crds/patchy.bitwisemedia.uk_integrations.yaml
    - crds/patchy.bitwisemedia.uk_investigations.yaml
    - crds/patchy.bitwisemedia.uk_remediations.yaml
    - crds/patchy.bitwisemedia.uk_repositories.yaml
    - namespace.yaml
    - serviceaccount.yaml
    - rbac.yaml
    - configmap.yaml
    - deployment-integration-controller.yaml
    - deployment-source-controller.yaml
    - deployment-context-controller.yaml
    - deployment-investigation-controller.yaml
    - deployment-remediation-controller.yaml
    - deployment-status-server.yaml
    - service.yaml
    - networkpolicy.yaml
    # Field-level authorization for human actions (see the file header).
    # Needs Kubernetes 1.30+; without it the custom verbs are advisory only.
    - admission-policy.yaml
    # secrets.example.yaml and crs.example.yaml are documentation, not
    # resources — see the files.

labels:
    - includeSelectors: false
      pairs:
          app.kubernetes.io/part-of: patchy
          app.kubernetes.io/managed-by: kustomize

# Overlays pin tags/digests by patching these entries.
#
# NOTE: each per-harness agent-runner image appears TWICE in the rendered
# output — here (so the transformer knows it) and as the
# PATCHY_<HARNESS>_AGENT_IMAGE value in configmap.yaml, which is the string the
# job controllers stamp into the Jobs they create. `images:` does not rewrite
# ConfigMap values, so an overlay that pins a runner image must patch BOTH.
images:
    - name: ghcr.io/bitwise-media-group/patchy/integration-controller
      newTag: latest
    - name: ghcr.io/bitwise-media-group/patchy/source-controller
      newTag: latest
    - name: ghcr.io/bitwise-media-group/patchy/context-controller
      newTag: latest
    - name: ghcr.io/bitwise-media-group/patchy/investigation-controller
      newTag: latest
    - name: ghcr.io/bitwise-media-group/patchy/remediation-controller
      newTag: latest
    - name: ghcr.io/bitwise-media-group/patchy/claude-agent-runner
      newTag: latest
    - name: ghcr.io/bitwise-media-group/patchy/codex-agent-runner
      newTag: latest
    - name: ghcr.io/bitwise-media-group/patchy/status-server
      newTag: latest
