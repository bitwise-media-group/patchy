#
# DOCUMENTATION, not a resource — deliberately absent from kustomization.yaml
# (like secrets.example.yaml). Copy into your environment overlay and bind to
# your own users/SSO groups.
#
# Two clients consume these grants, and they are authorized differently:
#
#   * the STATUS PAGE evaluates them per signed-in user by asking the cluster
#     (SubjectAccessReview) — those users need no kubeconfig and never talk to
#     the API server themselves;
#   * the patchy CLI acts as the user's OWN kubeconfig identity, so the API
#     server authorizes it directly.
#
# The CLI is why every role below viewer also grants native `update`: without
# it no client acting as the user could write a finding at all. RBAC has no
# notion of a field, so `update` alone would grant the whole resource — the
# ValidatingAdmissionPolicy in admission-policy.yaml is what narrows it back
# down, binding each spec field to its custom verb for every client equally.
# Grant `update` only alongside that policy, and note that `create`/`delete`
# are deliberately absent: with them, a user could delete a finding and
# recreate it with an approval already set.
#
# What the verbs buy:
#
#   * viewing findings   — native `get` on findings
#   * the action buttons — the CUSTOM verbs approve / retry / expedite /
#                          suspend / resume on findings.patchy.bitwisemedia.uk.
#                          Custom verbs are plain strings to RBAC; nothing
#                          else consumes them, so granting one confers exactly
#                          one button. approve releases holds and revives
#                          handed-off findings; retry recovers a Failed
#                          finding to the state it failed from; expedite skips
#                          the waiting stages (accumulation window, minimum
#                          age, queue position).
#   * the user menu's demo tooling — the CUSTOM verbs replay / reset on
#                          findings.patchy.bitwisemedia.uk. replay asks the
#                          integration-controller to redeliver the webhook
#                          delivery log; reset deletes every pipeline
#                          resource in the namespace (findings, runs,
#                          repositories, rollups). Grant sparingly.
#
# Rollup statistics are public by design and need no grant on the status page.
# The CLI reads them through the API server like anything else, so `patchy get
# rollups` does need get/list — which the viewer role already carries.
#
# Subjects come from the OIDC claims (auth config claims: username/groups),
# so bind Users to the username claim's values (e.g. email) and Groups to the
# groups claim's values. The example bindings are namespaced to `patchy`:
# grants apply per namespace, uniformly across the findings in it.
---
# Read-only: sees the findings board and detail, never an action button.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
    name: patchy-findings-viewer
    labels:
        app.kubernetes.io/part-of: patchy
rules:
    - apiGroups: [patchy.bitwisemedia.uk]
      resources: [findings, findingrollups]
      verbs: [get, list]
---
# Viewer + the approve button (AwaitingApproval holds and HandedOff revival).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
    name: patchy-findings-approver
    labels:
        app.kubernetes.io/part-of: patchy
rules:
    - apiGroups: [patchy.bitwisemedia.uk]
      resources: [findings, findingrollups]
      verbs: [get, list]
    - apiGroups: [patchy.bitwisemedia.uk]
      resources: [findings]
      # update is the native verb the API server checks; the admission policy
      # is what limits it to spec.approval for this role.
      verbs: [update, patch, approve]
---
# Viewer + every action: approve, retry, expedite, suspend, resume.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
    name: patchy-findings-operator
    labels:
        app.kubernetes.io/part-of: patchy
rules:
    - apiGroups: [patchy.bitwisemedia.uk]
      resources: [findings, findingrollups]
      verbs: [get, list]
    - apiGroups: [patchy.bitwisemedia.uk]
      resources: [findings]
      verbs: [update, patch, approve, retry, expedite, suspend, resume]
---
# Operator + the user menu's demo tooling: replay the webhook delivery log,
# reset (delete) all pipeline state. For demo/dev environments.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
    name: patchy-findings-admin
    labels:
        app.kubernetes.io/part-of: patchy
rules:
    - apiGroups: [patchy.bitwisemedia.uk]
      resources: [findings, findingrollups]
      verbs: [get, list]
    - apiGroups: [patchy.bitwisemedia.uk]
      resources: [findings]
      verbs: [update, patch, approve, retry, expedite, suspend, resume, replay, reset]
---
# Example bindings: an SSO group of operators, one individual approver.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
    name: patchy-findings-operators
    namespace: patchy
    labels:
        app.kubernetes.io/part-of: patchy
roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: ClusterRole
    name: patchy-findings-operator
subjects:
    - kind: Group
      apiGroup: rbac.authorization.k8s.io
      name: security-engineering # a `groups` claim value
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
    name: patchy-findings-approvers
    namespace: patchy
    labels:
        app.kubernetes.io/part-of: patchy
roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: ClusterRole
    name: patchy-findings-approver
subjects:
    - kind: User
      apiGroup: rbac.authorization.k8s.io
      name: dev@example.com # a `username` claim value
