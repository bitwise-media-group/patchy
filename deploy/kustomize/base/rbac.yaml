#
# RBAC, in full.
#
# ONLY patchy-remediation-controller gets Kubernetes API access, and only in
# the patchy-agents namespace. There is deliberately NO Role, ClusterRole,
# RoleBinding or ClusterRoleBinding for:
#
#   - patchy-source-controller   — talks to GitHub only.
#   - patchy-context-controller  — talks to GitHub only.
#   - patchy-agent (the Job pods) — talks to api.anthropic.com only; giving it
#     API access would let a prompt-injected agent read the very Secrets the
#     isolation model depends on.
#
# The verbs below are exactly what internal/jobs and internal/remedctrl use:
#   jobs      create (Create), get/list/watch (status + orphan sweep), delete
#   pods      get/list/watch (find the Job's pod)
#   pods/log  get (read the PATCHY-EVENT: stream)
#   secrets   create/get/delete (the per-Job Secret carrying the scoped GitHub
#             token and the issue/classification markdown; it is
#             owner-referenced to the Job, but the controller must also be
#             able to delete it on the create-Job-failed rollback path)
#   configmaps create/get/delete (reserved for the same handoff mechanism)
#
# No secrets "list"/"watch": the controller only ever addresses its own
# per-Job Secret by name.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
    name: patchy-remediation-controller
    namespace: patchy-agents
    labels:
        app.kubernetes.io/name: remediation-controller
        app.kubernetes.io/part-of: patchy
rules:
    - apiGroups: ["batch"]
      resources: ["jobs"]
      verbs: ["create", "get", "list", "watch", "delete"]
    - apiGroups: [""]
      resources: ["pods"]
      verbs: ["get", "list", "watch"]
    - apiGroups: [""]
      resources: ["pods/log"]
      verbs: ["get"]
    - apiGroups: [""]
      resources: ["secrets", "configmaps"]
      verbs: ["create", "get", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
    name: patchy-remediation-controller
    namespace: patchy-agents
    labels:
        app.kubernetes.io/name: remediation-controller
        app.kubernetes.io/part-of: patchy
roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: Role
    name: patchy-remediation-controller
subjects:
    - kind: ServiceAccount
      name: patchy-remediation-controller
      namespace: patchy
