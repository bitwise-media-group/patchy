#
# One Service per controller plus one for the webhook-controller. Each binary
# serves the same three endpoints on :8080 (internal/webhook): POST /webhook,
# GET /healthz, GET /readyz.
#
# ClusterIP only, and only the webhook-controller is meant to be reachable from
# outside: GitHub's single webhook URL points at it, and it routes each
# delivery to the controller Services that consume its event type (see
# deploy/README.md). Put an Ingress / Gateway in front of patchy-webhook-controller
# in your own environment overlay. The dev overlay patches the Services to
# NodePort for kind.
---
apiVersion: v1
kind: Service
metadata:
    name: patchy-webhook-controller
    namespace: patchy
    labels:
        app.kubernetes.io/name: webhook-controller
        app.kubernetes.io/part-of: patchy
spec:
    type: ClusterIP
    selector:
        app.kubernetes.io/name: webhook-controller
        app.kubernetes.io/part-of: patchy
    ports:
        - name: http
          port: 8080
          targetPort: http
          protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
    name: patchy-source-controller
    namespace: patchy
    labels:
        app.kubernetes.io/name: source-controller
        app.kubernetes.io/part-of: patchy
spec:
    type: ClusterIP
    selector:
        app.kubernetes.io/name: source-controller
        app.kubernetes.io/part-of: patchy
    ports:
        - name: http
          port: 8080
          targetPort: http
          protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
    name: patchy-context-controller
    namespace: patchy
    labels:
        app.kubernetes.io/name: context-controller
        app.kubernetes.io/part-of: patchy
spec:
    type: ClusterIP
    selector:
        app.kubernetes.io/name: context-controller
        app.kubernetes.io/part-of: patchy
    ports:
        - name: http
          port: 8080
          targetPort: http
          protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
    name: patchy-remediation-controller
    namespace: patchy
    labels:
        app.kubernetes.io/name: remediation-controller
        app.kubernetes.io/part-of: patchy
spec:
    type: ClusterIP
    selector:
        app.kubernetes.io/name: remediation-controller
        app.kubernetes.io/part-of: patchy
    ports:
        - name: http
          port: 8080
          targetPort: http
          protocol: TCP
