#
# Two Services, because only two things are dialled by anything:
#
#   * patchy-integration-controller:8080 — the single internet-facing entry
#     point (the provider webhook receivers, e.g. POST /github/webhooks).
#     Put an Ingress / Gateway in front of it in your environment overlay.
#   * patchy-source-controller:9790 — the artifact server the agent pods
#     fetch SHA-pinned repository tarballs from (in-cluster only; the
#     NetworkPolicies restrict it to the patchy-agents namespace).
#
# The other controllers serve nothing but kubelet probes on :8081, which hit
# the pod directly — no Service needed.
---
apiVersion: v1
kind: Service
metadata:
    name: patchy-integration-controller
    namespace: patchy
    labels:
        app.kubernetes.io/name: integration-controller
        app.kubernetes.io/part-of: patchy
spec:
    type: ClusterIP
    selector:
        app.kubernetes.io/name: integration-controller
        app.kubernetes.io/part-of: patchy
    ports:
        - name: http
          port: 8080
          targetPort: http
          protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
    name: patchy-source-controller
    namespace: patchy
    labels:
        app.kubernetes.io/name: source-controller
        app.kubernetes.io/part-of: patchy
spec:
    type: ClusterIP
    selector:
        app.kubernetes.io/name: source-controller
        app.kubernetes.io/part-of: patchy
    ports:
        - name: artifact
          port: 9790
          targetPort: artifact
          protocol: TCP
