---
# source-controller and context-controller get a service account only because
# every pod gets one. Neither talks to the Kubernetes API, so neither is bound
# to any Role (see rbac.yaml) and both disable the token mount in their
# Deployment (automountServiceAccountToken: false).
apiVersion: v1
kind: ServiceAccount
metadata:
    name: patchy-source-controller
    namespace: patchy
    labels:
        app.kubernetes.io/name: source-controller
        app.kubernetes.io/part-of: patchy
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
    name: patchy-context-controller
    namespace: patchy
    labels:
        app.kubernetes.io/name: context-controller
        app.kubernetes.io/part-of: patchy
automountServiceAccountToken: false
---
# The only identity with Kubernetes API access: it creates the agent Jobs and
# their per-Job Secrets, and reads pod logs to consume the agent's event
# stream. Its token IS mounted.
apiVersion: v1
kind: ServiceAccount
metadata:
    name: patchy-remediation-controller
    namespace: patchy
    labels:
        app.kubernetes.io/name: remediation-controller
        app.kubernetes.io/part-of: patchy
---
# The identity the agent Job pods run as (internal/jobs default
# --agent-service-account=patchy-agent). The agent needs NO Kubernetes API
# access whatsoever, so no Role is bound to it and its token is not mounted.
apiVersion: v1
kind: ServiceAccount
metadata:
    name: patchy-agent
    namespace: patchy-agents
    labels:
        app.kubernetes.io/name: patchy-agent
        app.kubernetes.io/part-of: patchy
automountServiceAccountToken: false
