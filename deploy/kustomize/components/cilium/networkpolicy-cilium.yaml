#
# Defence in depth for the agent sandbox, for clusters whose CNI is Cilium.
#
# What this adds over base/networkpolicy.yaml: FQDN matching. A plain
# NetworkPolicy can only say "TCP 443 to the internet"; Cilium's DNS proxy
# lets it say "TCP 443 to api.anthropic.com, and nothing else". Everything
# else — a package registry the agent tries to reach, an exfil endpoint a
# prompt-injected agent is talked into — is dropped.
#
# The agent pod needs exactly two destinations:
#
#   * source-controller's artifact server (in-cluster, port 9790): the init
#     container's credential-less, digest-verified tarball fetch. No forge
#     host appears in this policy at all — the pod never talks to GitHub.
#   * api.anthropic.com: the agent container's `claude -p`.
#
# Requires: Cilium with DNS-based policy enabled (the DNS proxy). If your CNI
# is not Cilium, drop this component; base/networkpolicy.yaml still applies
# and is the floor.
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
    name: patchy-agent-egress
    namespace: patchy-agents
    labels:
        app.kubernetes.io/part-of: patchy
spec:
    endpointSelector:
        matchLabels:
            app.kubernetes.io/name: patchy-agent
            app.kubernetes.io/managed-by: patchy
    egress:
        # DNS, via Cilium's proxy — this is what makes toFQDNs work at all:
        # the proxy watches the answers and programs the resolved IPs into the
        # policy. Only the names below may be resolved.
        - toEndpoints:
              - matchLabels:
                    io.kubernetes.pod.namespace: kube-system
                    k8s-app: kube-dns
          toPorts:
              - ports:
                    - port: "53"
                      protocol: ANY
                rules:
                    dns:
                        - matchPattern: "*.anthropic.com"
                        - matchPattern: "*.patchy.svc.cluster.local"
                        - matchPattern: "*.svc.cluster.local"

        # The INIT container's artifact fetch: source-controller's tarball
        # server, in-cluster, credential-less, digest-verified.
        - toEndpoints:
              - matchLabels:
                    io.kubernetes.pod.namespace: patchy
                    app.kubernetes.io/name: source-controller
          toPorts:
              - ports:
                    - port: "9790"
                      protocol: TCP

        # The agent container: `claude -p` and nothing else.
        - toFQDNs:
              - matchName: api.anthropic.com
          toPorts:
              - ports:
                    - port: "443"
                      protocol: TCP
