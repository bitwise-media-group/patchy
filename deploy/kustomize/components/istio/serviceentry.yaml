#
# The egress allowlist: the only external host REGISTRY_ONLY (sidecar.yaml)
# lets an agent pod reach. Same list as the Cilium component's toFQDNs.
#
# exportTo: "." keeps the entry private to patchy-agents — no other
# namespace's sidecar config grows an api.anthropic.com route because of the
# agent sandbox.
#
# There is deliberately NO GitHub entry: the repository arrives as a tarball
# from source-controller's in-cluster artifact server (a mesh-registry
# Service the Sidecar below already exposes), and the pod holds no forge
# credential.
---
# The agent container: `claude -p` and nothing else.
apiVersion: networking.istio.io/v1
kind: ServiceEntry
metadata:
    name: patchy-agent-anthropic
    namespace: patchy-agents
    labels:
        app.kubernetes.io/part-of: patchy
spec:
    exportTo: ["."]
    hosts:
        - api.anthropic.com
    location: MESH_EXTERNAL
    resolution: DNS
    ports:
        - number: 443
          name: tls
          protocol: TLS
