#
# Defence in depth for the agent sandbox, for clusters running Istio.
#
# What this adds over base/networkpolicy.yaml: hostname matching. A plain
# NetworkPolicy can only say "TCP 443 to the internet"; REGISTRY_ONLY makes
# the sidecar drop any outbound connection whose destination is not in the
# mesh registry, and the only registry entries visible to this namespace are
# the api.anthropic.com ServiceEntry beside this file plus the patchy
# namespace's Services (source-controller's artifact server). TLS is not
# terminated — the proxy matches the SNI in the client hello against those
# hosts and passes the bytes through or blackholes them.
#
# WHAT THIS DOES NOT DO — read this before believing the sandbox is airtight:
#
# One Sidecar per harness, scoped by the patchy.bitwisemedia.uk/harness label,
# each permitting only its own model host (plus the patchy namespace's Services
# for the artifact fetch) — so a claude pod cannot reach api.openai.com and a
# codex pod cannot reach api.anthropic.com even though both ServiceEntries are
# registered in the namespace. The codex Sidecar is inert until the codex
# runner is enabled (no codex pod carries the label otherwise).
#
# WHAT THIS DOES NOT DO — read this before believing the sandbox is airtight:
#
#   * A Sidecar serves the whole POD, not one container: the model-API
#     route the agent container needs is reachable from the init container
#     too, and vice versa for the artifact server. Credential absence is the
#     control; this policy is the belt to its braces.
#   * Unlike Cilium's DNS proxy, the sidecar does not constrain what names
#     the pod may RESOLVE (DNS is UDP 53 straight to kube-dns, allowed by
#     base/networkpolicy.yaml). A prompt-injected agent can still exfiltrate
#     via DNS queries. Istio's DNS capture does not close this; only a
#     DNS-filtering resolver or Cilium-style DNS policy does.
#   * The enforcement point lives INSIDE the pod (iptables redirect to the
#     proxy). That is sound here because the agent runs as uid 65532 with all
#     capabilities dropped — it cannot rewrite the redirect — but it is a
#     weaker vantage point than a CNI enforcing on the node.
---
apiVersion: networking.istio.io/v1
kind: Sidecar
metadata:
    name: patchy-agent-egress-claude
    namespace: patchy-agents
    labels:
        app.kubernetes.io/part-of: patchy
spec:
    workloadSelector:
        labels:
            app.kubernetes.io/name: patchy-agent
            app.kubernetes.io/managed-by: patchy
            patchy.bitwisemedia.uk/harness: claude
    # Drop anything not in the registry instead of passing it through.
    outboundTrafficPolicy:
        mode: REGISTRY_ONLY
    egress:
        # This harness's model host (the api.anthropic.com ServiceEntry,
        # exportTo: ".") and the patchy namespace's Services — which is how the
        # init container reaches source-controller's artifact server.
        - hosts:
              - ./api.anthropic.com
              - patchy/*
---
apiVersion: networking.istio.io/v1
kind: Sidecar
metadata:
    name: patchy-agent-egress-codex
    namespace: patchy-agents
    labels:
        app.kubernetes.io/part-of: patchy
spec:
    workloadSelector:
        labels:
            app.kubernetes.io/name: patchy-agent
            app.kubernetes.io/managed-by: patchy
            patchy.bitwisemedia.uk/harness: codex
    outboundTrafficPolicy:
        mode: REGISTRY_ONLY
    egress:
        - hosts:
              - ./api.openai.com
              - patchy/*
