#
# Dev-only PAT auth: PATCHY_GITHUB_TOKEN wins over App auth (internal/cli), so
# a patchy-github-token Secret turns the placeholder App creds into a working
# GitHub client. The secretKeyRef is optional — without the Secret the pod
# still starts (and fails GitHub auth exactly as before). `mise run dev-colima`
# creates the Secret from $GITHUB_TOKEN; targets are the three GitHub-facing
# controllers only — the webhook-controller holds no GitHub credential by
# design.
---
apiVersion: apps/v1
kind: Deployment
metadata:
    name: placeholder # replaced by the patch target
spec:
    template:
        spec:
            containers:
                - name: controller
                  env:
                      - name: PATCHY_GITHUB_TOKEN
                        valueFrom:
                            secretKeyRef:
                                name: patchy-github-token
                                key: token
                                optional: true
