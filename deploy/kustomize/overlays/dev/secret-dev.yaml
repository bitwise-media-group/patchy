#
# THROWAWAY DEV CREDENTIALS. Nothing here is real, and nothing here may ever
# be copied into an environment that faces the internet. They exist so that
# `kubectl apply -k overlays/dev` produces pods that START — every controller
# fails at boot without a webhook secret (internal/cli.WebhookSecret returns an
# error when the file is missing or empty) and every agent Job pod fails with
# CreateContainerConfigError without patchy-anthropic.
#
# To do anything real in dev, overwrite them in the cluster (not in git):
#
#   kubectl -n patchy create secret generic patchy-github-app \
#     --from-literal=app-id=<id> --from-file=private-key.pem=<key.pem> \
#     --dry-run=client -o yaml | kubectl apply -f -
#
#   kubectl -n patchy create secret generic patchy-webhook-secret \
#     --from-literal=secret="$(openssl rand -hex 32)" \
#     --dry-run=client -o yaml | kubectl apply -f -
#
#   kubectl -n patchy-agents create secret generic patchy-anthropic \
#     --from-literal=api-key="$ANTHROPIC_API_KEY" \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# (PATCHY_GITHUB_TOKEN — a PAT — is the documented dev fallback in
# internal/cli.Options and wins over App auth. The dev overlay wires it from
# an OPTIONAL patchy-github-token Secret into the GitHub-facing controllers
# (deployment-github-token-patch.yaml); `GITHUB_TOKEN=<pat> mise run
# dev-colima` creates it, or by hand:
#
#   kubectl -n patchy create secret generic patchy-github-token \
#     --from-literal=token=<pat> \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# It is a Secret in every meaningful sense, so keep it out of git too.)
---
apiVersion: v1
kind: Secret
metadata:
    name: patchy-github-app
    namespace: patchy
    labels:
        app.kubernetes.io/part-of: patchy
type: Opaque
stringData:
    app-id: "0"
    # Not a key. A placeholder so the volume projects and the pod starts;
    # GitHub calls will fail until it is replaced.
    private-key.pem: |
        -----BEGIN RSA PRIVATE KEY-----
        REPLACE-ME-NOT-A-REAL-KEY
        -----END RSA PRIVATE KEY-----
---
apiVersion: v1
kind: Secret
metadata:
    name: patchy-webhook-secret
    namespace: patchy
    labels:
        app.kubernetes.io/part-of: patchy
type: Opaque
stringData:
    secret: dev-webhook-secret-replace-me
---
apiVersion: v1
kind: Secret
metadata:
    name: patchy-anthropic
    namespace: patchy-agents
    labels:
        app.kubernetes.io/part-of: patchy
type: Opaque
stringData:
    # internal/jobs ALWAYS wires ANTHROPIC_API_KEY into the agent container
    # from this Secret, whatever harness is configured — so it must exist even
    # for a fake-harness run, and a run that actually calls the model needs a
    # real key here.
    api-key: dev-not-a-real-key
