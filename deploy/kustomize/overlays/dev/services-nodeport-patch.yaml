#
# kind has no load balancer. NodePort + `extraPortMappings` in the kind config
# is how a webhook delivery (from a tunnel — smee.io, ngrok, `gh webhook
# forward`) reaches the integration-controller. The nodePort number (30079)
# is set in kustomization.yaml.
---
apiVersion: v1
kind: Service
metadata:
    name: placeholder # replaced by the patch target
spec:
    type: NodePort
