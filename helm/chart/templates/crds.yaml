apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    {{- if .Values.crds.keep }}
    helm.sh/resource-policy: keep
    {{- end }}
    controller-gen.kubebuilder.io/version: v0.21.0
  name: repositories.patchy.bitwisemedia.uk
spec:
  group: patchy.bitwisemedia.uk
  names:
    categories:
    - patchy
    kind: Repository
    listKind: RepositoryList
    plural: repositories
    shortNames:
    - repo
    singular: repository
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.url
      name: URL
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .status.resolvedSHA
      name: SHA
      priority: 1
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Repository is a SHA-pinned clone artifact: source-controller clones the
          repository with Forge credentials and serves it as a tarball that agent
          jobs fetch credential-lessly. Owned by a Finding and garbage-collected
          with it.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              RepositorySpec asks source-controller to produce a SHA-pinned clone
              artifact of one repository.
            properties:
              ref:
                description: Ref selects what to clone.
                properties:
                  branch:
                    description: |-
                      Branch to resolve; source-controller resolves it to a SHA exactly once
                      and pins status.resolvedSHA.
                    type: string
                type: object
              url:
                description: URL is the normalized https URL of the repository to
                  clone.
                minLength: 1
                type: string
                x-kubernetes-validations:
                - message: spec.url is immutable
                  rule: self == oldSelf
            required:
            - url
            type: object
          status:
            description: RepositoryStatus is the repository artifact's observed state.
            properties:
              artifact:
                description: Artifact is the served tarball.
                properties:
                  digest:
                    description: |-
                      Digest is the sha256 of the tarball, verified by the fetching init
                      container.
                    type: string
                  lastFetchedAt:
                    description: LastFetchedAt is when the clone was produced.
                    format: date-time
                    type: string
                  sizeBytes:
                    description: SizeBytes of the tarball.
                    format: int64
                    type: integer
                  url:
                    description: |-
                      URL the artifact is served at (cluster-internal; the path embeds an
                      unguessable random id).
                    type: string
                required:
                - digest
                - url
                type: object
              conditions:
                description: |-
                  Conditions of the repository (Ready: artifact available; Stalled:
                  cannot clone or artifact over the size cap).
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              forge:
                description: Forge names the Forge whose credentials cloned the repository.
                properties:
                  name:
                    description: Name of the referent.
                    minLength: 1
                    type: string
                required:
                - name
                type: object
              observedGeneration:
                description: ObservedGeneration is the last spec generation acted
                  on.
                format: int64
                type: integer
              resolvedSHA:
                description: |-
                  ResolvedSHA is the commit the artifact is pinned to; investigation and
                  remediation both work this exact tree, and it is the push base.
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
{{- end }}
