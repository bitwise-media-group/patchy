#
# source-controller and context-controller get a service account only because
# every pod gets one. Neither talks to the Kubernetes API, so neither is bound
# to any Role (see rbac.yaml) and both disable the token mount.
apiVersion: v1
kind: ServiceAccount
metadata:
    name: {{ include "patchy.fullname" . }}-source-controller
    namespace: {{ .Release.Namespace }}
    labels:
        {{- include "patchy.labels" (dict "root" . "name" "source-controller") | nindent 8 }}
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
    name: {{ include "patchy.fullname" . }}-context-controller
    namespace: {{ .Release.Namespace }}
    labels:
        {{- include "patchy.labels" (dict "root" . "name" "context-controller") | nindent 8 }}
automountServiceAccountToken: false
---
# The only identity with Kubernetes API access: it creates the agent Jobs and
# their per-Job Secrets, and reads pod logs to consume the agent's event
# stream. Its token IS mounted.
apiVersion: v1
kind: ServiceAccount
metadata:
    name: {{ include "patchy.fullname" . }}-remediation-controller
    namespace: {{ .Release.Namespace }}
    labels:
        {{- include "patchy.labels" (dict "root" . "name" "remediation-controller") | nindent 8 }}
---
# The identity the agent Job pods run as (PATCHY_AGENT_SERVICE_ACCOUNT). The
# agent needs NO Kubernetes API access whatsoever, so no Role is bound to it
# and its token is not mounted.
apiVersion: v1
kind: ServiceAccount
metadata:
    name: {{ .Values.agent.serviceAccount }}
    namespace: {{ .Values.agent.namespace }}
    labels:
        {{- include "patchy.labels" (dict "root" . "name" "patchy-agent") | nindent 8 }}
automountServiceAccountToken: false
