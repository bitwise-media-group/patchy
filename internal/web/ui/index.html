<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>patchy · finding status</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="theme-patchy">
    <script>
      // Pre-paint theme restore — same class pair and storage key as the other
      // patchy surfaces, so the chosen mode follows the visitor across kits.
      (function () {
        try {
          if (localStorage.getItem("patchy-theme") === "light") {
            document.body.classList.replace("theme-patchy", "theme-patchy-light");
          }
        } catch (e) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
