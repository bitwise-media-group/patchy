# The e2e suite is a separate module: it builds the real controller binaries
# and drives them with recorded webhook fixtures against an in-memory GitHub.
# No cluster, no credentials, no network.
[e2e]
description = "run the end-to-end suite (real binaries, fake GitHub)"
dir = "{{cwd}}/e2e"
run = "go test ./... -count=1"

# Deliver a recorded webhook fixture to a locally-running controller, signed
# with its secret — the local stand-in for GitHub.
# Example: mise run replay -- -secret-file dev.secret e2e/fixtures/webhooks/issues.opened.json
[replay]
description = "sign and deliver a webhook fixture to a running controller"
dir = "{{cwd}}/e2e"
run = "go run ./replay"

# Redefines the archetype's build task (whole-task replacement): patchy is
# multi-binary — one controller per concern plus the agent runtime — so the
# single-app go-build is replaced by a loop over cmd/. Same ldflags contract as
# the archetype (and .goreleaser.yaml): version metadata stamped into
# internal/version.
[build]
description = "build all patchy binaries into bin/"
dir = "{{cwd}}"
run = """
set -eu
module="${MODULE:-$(go list -m)}"
version="${VERSION:-$(git describe --tags --always --dirty 2>/dev/null || echo dev)}"
commit="${COMMIT:-$(git rev-parse --short HEAD 2>/dev/null || echo none)}"
date="${DATE:-$(date -u +%Y-%m-%dT%H:%M:%SZ)}"
ldflags="${LDFLAGS:--s -w \
  -X $module/internal/version.Version=$version \
  -X $module/internal/version.Commit=$commit \
  -X $module/internal/version.BuildDate=$date}"
mkdir -p bin
for app in source-controller context-controller remediation-controller webhook-controller agent-runner; do
  CGO_ENABLED=0 go build -trimpath -ldflags "$ldflags" -o "bin/$app" "./cmd/$app"
done
"""

# One-command local dev loop on Colima: start the VM+k3s if needed, snapshot
# the images, retag the host-arch ones as patchy/<app>:dev (the tags the dev
# overlay expects — the shared Docker/k3s image store makes the tag the whole
# "load" step), apply the overlay, and restart the deployments so a re-run
# redeploys the fresh build. See docs/deployment/colima.md.
[dev-colima]
description = "start colima, build snapshot images, deploy the dev overlay"
dir = "{{cwd}}"
run = """
{% raw %}
set -eu
for tool in colima docker kubectl; do
  command -v "$tool" >/dev/null || { echo "error: $tool not found (brew install $tool)" >&2; exit 1; }
done

# start colima with k8s if it isn't running; if it is, trust it and just
# verify the colima kube context answers (catches a colima started without
# --kubernetes). Passing any --k3s-arg replaces colima's default
# [--disable=traefik], so an inert arg (--tls-san=localhost) keeps the
# bundled traefik ingress controller enabled — the dev overlay ships an
# Ingress for the webhook-controller that it satisfies.
colima status >/dev/null 2>&1 || colima start --kubernetes \
  --cpu "${COLIMA_CPU:-4}" --memory "${COLIMA_MEMORY:-8}" \
  --k3s-arg=--tls-san=localhost
kubectl --context colima get --raw /readyz >/dev/null || {
  echo "error: colima is running but k3s is not reachable — start with --kubernetes" >&2; exit 1; }
kubectl --context colima get ingressclass traefik >/dev/null 2>&1 || {
  echo "note: no traefik IngressClass — this colima predates the traefik-enabled start;" >&2
  echo "      'colima stop' and re-run to reinstall k3s with the ingress controller" >&2; }

mise run snapshot

# retag the host-arch snapshot images as patchy/<app>:dev (dev overlay names)
arch=$(uname -m)
[ "$arch" = x86_64 ] && arch=amd64
for app in webhook-controller source-controller context-controller remediation-controller agent-runner; do
  tag=$(docker images "ghcr.io/bitwise-media-group/patchy/$app" --format '{{.Tag}}' \
    | grep -- "-$arch$" | head -1)
  [ -n "$tag" ] || { echo "error: no snapshot image for $app ($arch)" >&2; exit 1; }
  docker tag "ghcr.io/bitwise-media-group/patchy/$app:$tag" "patchy/$app:dev"
done

kubectl --context colima apply -k deploy/kustomize/overlays/dev

# optional PAT: the dev overlay wires PATCHY_GITHUB_TOKEN (wins over the
# placeholder App creds) from this Secret into the GitHub-facing controllers
if [ -n "${GITHUB_TOKEN:-}" ]; then
  printf '%s' "$GITHUB_TOKEN" \
    | kubectl --context colima -n patchy create secret generic patchy-github-token \
        --from-file=token=/dev/stdin --dry-run=client -o yaml \
    | kubectl --context colima apply -f -
else
  echo "note: GITHUB_TOKEN not set — controllers will crash-loop on the placeholder" >&2
  echo "      GitHub creds; see docs/deployment/colima.md#github-credentials" >&2
fi

# same :dev tag every run — restart so pods pick up the retagged image
kubectl --context colima -n patchy rollout restart deployment -l app.kubernetes.io/part-of=patchy
kubectl --context colima -n patchy rollout status deployment -l app.kubernetes.io/part-of=patchy --timeout=120s
echo "patchy dev stack ready — ingress: http://localhost/webhook  nodeport: http://localhost:30079/healthz"
{% endraw %}
"""

# The helm chart (helm/chart) renders the same stack as deploy/kustomize and
# is published to oci://ghcr.io/bitwise-media-group/patchy/charts by
# .github/workflows/helm.yaml on release. This is the local gate: lint plus a
# render of every component combination the templates branch on.
[helm-lint]
description = "lint and render the helm chart"
dir = "{{cwd}}"
run = """
set -eu
helm lint helm/chart
helm template patchy helm/chart >/dev/null
helm template patchy helm/chart --set agent.networkPolicy.cilium.enabled=true >/dev/null
helm template patchy helm/chart --set agent.networkPolicy.istio.enabled=true >/dev/null
helm template patchy helm/chart \
  --set agent.networkPolicy.create=false --set agent.createNamespace=false \
  --set sourceController.networkPolicy.create=false \
  --set contextController.networkPolicy.create=false \
  --set remediationController.networkPolicy.create=false >/dev/null
helm template patchy helm/chart \
  --set webhook.host=patchy.example.com \
  --set webhook.ingress.enabled=true --set webhook.ingress.className=nginx \
  --set-json 'webhook.httpRoute={"enabled":true,"parentRefs":[{"name":"gw","namespace":"gateway-system"}]}' >/dev/null
"""

# Redefined gates: the archetype's ci/pr plus the zensical docs build, so a
# broken site fails CI instead of surfacing at release time (the reusable
# release workflow's docs job publishes the site, keyed off zensical.toml).
[ci]
description = "the gates the reusable CI workflow runs"
run = [
  { task = "lint" },
  { task = "test" },
  { task = "build" },
  { task = "docs-build" },
]

[pr]
description = "full local gate before a pull request"
run = [
  { task = "tidy" },
  { task = "fmt" },
  { task = "lint" },
  { task = "test" },
  { task = "build" },
  { task = "docs-build" },
  { task = "commit" },
]
